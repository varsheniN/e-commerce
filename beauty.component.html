<div class="container py-5">
  <div class="row mb-4 align-items-center">
    <div class="col-md-6">
      <h2 class="fw-bold m-0">Our Products</h2>
    </div>
    <div class="col-md-6 d-flex justify-content-md-end mt-3 mt-md-0">
      <div class="d-flex align-items-center">
        <label class="me-2 text-muted fw-semibold text-nowrap">Sort By:</label>
        <select
          class="form-select shadow-sm"
          (change)="bSortChange($event)"
          style="width: 200px"
        >
          <option value="default">Featured</option>
          <option value="low">Price: Low to High</option>
          <option value="high">Price: High to Low</option>
          <option value="name">Product Name (A-Z)</option>
        </select>
      </div>
    </div>
  </div>

  <div class="row g-4">
    <div
      class="col-12 col-md-6 col-lg-4 col-xl-3"
      *ngFor="let product of beautyProducts"
    >
      <div class="card h-100 shadow-sm border-0 product-hover">
        <div class="position-relative">
          <img
            [src]="product.thumbnailImage"
            class="card-img-top"
            [alt]="product.productShortName"
          />
        </div>

        <div class="card-body d-flex flex-column">
          <small
            class="text-uppercase text-muted fw-bold mb-1"
            style="font-size: 0.7rem"
          >
            {{ product.categoryName }}
          </small>
          <h5 class="card-title h6 mb-2">{{ product.productShortName }}</h5>
          <p class="card-text text-muted small flex-grow-1">
            {{ product.description | slice: 0 : 70 }}...
          </p>

          <div
            class="d-flex justify-content-between align-items-center mt-3 pt-2 border-top"
          >
            <span class="fs-5 fw-bold text-dark">
              {{ product.price | currency: "INR" : "symbol" : "1.0-0" }}
            </span>
            <button
              type="button"
              [class]="
                product.isAdded
                  ? 'btn btn-success btn-sm px-3'
                  : 'btn btn-primary btn-sm px-3'
              "
              (click)="addToCart($event, product)"
            >
              {{ product.isAdded ? "Added" : "Add" }}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
